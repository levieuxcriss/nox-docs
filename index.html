    /* ===== CodeBlock Components ===== */
    

window.CodeBlock = ({ code, language = 'lua', title }) => {
  const [copied, setCopied] = useState(false);

  const handleCopy = () => {
    navigator.clipboard.writeText(code).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div className="rounded-lg overflow-hidden bg-base-300 my-3">
      {title && (
        <div className="flex items-center justify-between px-4 py-2 bg-base-300 border-b border-base-content/10">
          <span className="text-xs font-mono text-base-content/50">{title}</span>
          <div className="flex items-center gap-2">
            <span className="text-[10px] badge badge-sm badge-ghost">{language}</span>
            <button onClick={handleCopy} className="btn btn-ghost btn-xs">
              {copied ? <Check size={12} className="text-success" /> : <Copy size={12} className="opacity-50" />}
            </button>
          </div>
        </div>
      )}
      {!title && (
        <div className="flex justify-end px-3 py-1">
          <button onClick={handleCopy} className="btn btn-ghost btn-xs">
            {copied ? <Check size={12} className="text-success" /> : <Copy size={12} className="opacity-50" />}
          </button>
        </div>
      )}
      <pre className="px-4 py-3 overflow-x-auto text-sm">
        <code className="text-base-content/80 font-mono text-xs leading-relaxed whitespace-pre">{code}</code>
      </pre>
    </div>
  );
};

[];

      </div>

        <h2 className="text-xl font-bold text-base-content mb-4">Command Details</h2>
        <div className="space-y-4">
          <div className="card bg-base-200">
            <div className="card-body">
              <h3 className="font-bold text-base-content"><code className="text-primary">/checkdeaths [server_id]</code></h3>
              <p className="text-sm text-base-content/60 mt-1">

                in-game ID (visible in the player list). Output is shown only to the admin running the command.
              </p>
            </div>
          </div>

          <div className="card bg-base-200">
            <div className="card-body">
              <h3 className="font-bold text-base-content"><code className="text-primary">/resetdeaths [server_id]</code></h3>
              <p className="text-sm text-base-content/60 mt-1">
                Resets a specific player's death count back to 0. Useful for giving players a second chance
                or resolving issues caused by bugs or unfair deaths.
              </p>
            </div>
          </div>

          <div className="card bg-base-200">
            <div className="card-body">
              <h3 className="font-bold text-base-content"><code className="text-primary">/resetalldeaths</code></h3>
              <p className="text-sm text-base-content/60 mt-1">

                testing your setup or manually removing a character.
              </p>
              <div className="alert alert-error mt-2">
                <p className="text-xs"><strong>Warning:</strong> This permanently deletes the player's character. Use only for testing or when absolutely necessary.</p>
